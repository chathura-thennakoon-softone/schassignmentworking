<button
  *hasPolicy="Policy.AddStudents"
  (click)="onAdd()"
  [disabled]="gridDataLoading() || isDeleting()"
>Add</button>

<button
  *hasPolicy="Policy.DeleteStudents"
  (click)="onRemoveAll()"
  [disabled]="gridDataLoading() || isDeleting() || rowData().length === 0"
>Remove All</button>

<div class="content">
  <ag-grid-angular
    style="width: 100%; height: 550px;"
    [rowData]="rowData()"
    [columnDefs]="columnDefs"
    (cellClicked)="onCellClicked($event)"
    (gridReady)="onGridReady($event)"
  />
</div>
